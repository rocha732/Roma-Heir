<div class="modal-backdrop">
  <div class="modal-content">
    <h2>Agregar Producto</h2>
    <form (ngSubmit)="onSave()">

      <label for="name">Nombre</label>
      <input type="text" id="name" placeholder="Nombre" [(ngModel)]="product.name" name="name" required />
      <div *ngIf="nameError" style="color:#e74c3c;font-size:0.95em;margin-bottom:0.5rem;">{{ nameError }}</div>


      <label for="description">Descripción</label>
      <input type="text" id="description" placeholder="Descripción" [(ngModel)]="product.description" name="description" />
      <div *ngIf="descriptionError" style="color:#e74c3c;font-size:0.95em;margin-bottom:0.5rem;">{{ descriptionError }}</div>

      <label for="price">Precio</label>
      <input type="number" id="price" placeholder="Precio" [(ngModel)]="product.price" name="price" />

      <label for="profileImageUrl">Imagen</label>
      <div 
        class="image-drop-area" 
        (dragover)="$event.preventDefault()" 
        (drop)="onImageDrop($event)"
        (click)="fileInput.click()"
        style="margin-bottom:0.7rem;cursor:pointer;display:flex;align-items:center;gap:1rem;min-height:60px;border:1px dashed #aaa;border-radius:6px;padding:0.5rem;">
        <ng-container *ngIf="product.profileImageUrl; else noImage">
          <img [src]="product.profileImageUrl" alt="preview" style="max-width:60px;max-height:60px;border-radius:6px;object-fit:cover;" />
          <span style="font-size:0.9em;color:#555;">Arrastra otra imagen o haz click para cambiar</span>
        </ng-container>
        <ng-template #noImage>
          <span style="font-size:0.9em;color:#888;">Arrastra una imagen aquí o haz click</span>
        </ng-template>
        <input type="file" #fileInput accept="image/*" style="display:none" (change)="onImageSelect($event)" />
      </div>

      <label for="categoryId">Categoría</label>
      <select id="categoryId" [(ngModel)]="product.CategoryId" name="CategoryId" required style="width:100%;margin-bottom:0.7rem;padding:0.5rem;border-radius:6px;border:1px solid #ccc;">
        <option [ngValue]="null" disabled>Selecciona una categoría</option>
        <option *ngFor="let cat of categories" [ngValue]="cat.id">{{ cat.name }}</option>
      </select>

      <label for="ProductType">Tipo de producto</label>
      <select id="ProductType" [(ngModel)]="product.ProductType" name="ProductType" required style="width:100%;margin-bottom:0.7rem;padding:0.5rem;border-radius:6px;border:1px solid #ccc;">
        <option [ngValue]="null" disabled>Selecciona un tipo</option>
        <option *ngFor="let type of productTypes" [ngValue]="type.id">{{ type.name }}</option>
      </select>
      <!--<label>
        <input type="checkbox" [(ngModel)]="product.available" name="available" />
        Disponible
      </label>-->
      <div class="modal-actions">
        <button type="submit">Guardar</button>
        <button type="button" (click)="onClose()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
