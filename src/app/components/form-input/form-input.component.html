<div class="mb-3">
  <label class="form-label">{{ label }}</label>
  <input
    class="form-control"
    [type]="type"
    [placeholder]="placeholder"
    [formControl]="control"
  />

  <div *ngIf="control.touched && control.invalid" class="text-danger mt-1">
    <small *ngIf="control.errors?.['required']">{{ label }} es obligatorio</small>
    <small *ngIf="control.errors?.['minlength']">
      Mínimo {{ control.errors?.['minlength'].requiredLength }} caracteres
    </small>
    <small *ngIf="control.errors?.['maxlength']">
      Máximo {{ control.errors?.['maxlength'].requiredLength }} caracteres
    </small>
    <small *ngIf="control.errors?.['email']">Correo inválido</small>
    <small *ngIf="control.errors?.['pattern']">Formato inválido</small>
  </div>
</div>
