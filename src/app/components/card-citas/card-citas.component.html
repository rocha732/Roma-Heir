<div class="card" [ngClass]="type">
  <div class="left">
    <h3>{{ title }}</h3>
    <p class="value">{{ value }}</p>
  </div>

  <div class="icon-wrapper">
    <mat-icon class="icon">
      {{ type === 'total' ? 'event_note' : type === 'hoy' ? 'schedule' : 'pending_actions' }}
    </mat-icon>
  </div>
</div>
