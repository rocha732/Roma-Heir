<div class="d-flex">
  <!-- Sidebar -->
  <aside class="sidebar bg-dark text-white p-3">
    <div class="text-center mb-4">
      <img
        src="assets/ico-logo.svg"
        alt="Logo"
        class="img-fluid"
        style="max-width: 140px"
      />
    </div>

    <nav class="nav flex-column gap-2">
      <a
        class="nav-link text-white sidebar-link"
        routerLink="dashboard"
        routerLinkActive="active-link"
      >
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
      </a>

      <a
        class="nav-link text-white sidebar-link"
        routerLink="profile"
        routerLinkActive="active-link"
      >
        <i class="bi bi-person-circle me-2"></i> Perfil
      </a>

      <a
        class="nav-link text-white sidebar-link"
        routerLink="settings"
        routerLinkActive="active-link"
      >
        <i class="bi bi-gear-fill me-2"></i> Configuración
      </a>

      <!-- Especialistas Usuarios Dropdown -->
      <div class="nav-item dropdown" [class.open]="isSpecialistOpen">
        <a
          class="nav-link text-white sidebar-link d-flex justify-content-between align-items-center"
          href="#"
          role="button"
          data-bs-toggle="collapse"
          [attr.aria-expanded]="false"
          (click)="toggleSpecialistDropdown()"
        >
          <span><i class="bi bi-people-fill me-2"></i> Usuarios</span>
          <i
            class="bi"
            [ngClass]="{
              'bi-caret-down-fill': !isSpecialistOpen,
              'bi-caret-up-fill': isSpecialistOpen
            }"
          ></i>
        </a>

        <div class="collapse" [ngClass]="{ show: isSpecialistOpen }">
          <ul class="nav flex-column ms-3 mt-1">
            <li>
              <a
                class="nav-link text-white sidebar-link"
                routerLink="users/view-users"
                routerLinkActive="active-link"
              >
                Ver Usuarios
              </a>
            </li>
            <li>
              <a
                class="nav-link text-white sidebar-link"
                routerLink="users/create-user"
                routerLinkActive="active-link"
              >
                Crear usuario
              </a>
            </li>
            <li>
              <a
                class="nav-link text-white sidebar-link"
                routerLink="users/edit-user"
                routerLinkActive="active-link"
              >
                Modificar usuario
              </a>
            </li>
          </ul>
        </div>
      </div>

      <!-- Especialistas Productos Dropdown -->
      <div class="nav-item dropdown" [class.open]="isProductOpen">
        <a
          class="nav-link text-white sidebar-link d-flex justify-content-between align-items-center"
          href="#"
          role="button"
          data-bs-toggle="collapse"
          [attr.aria-expanded]="false"
          (click)="toggleProductDropdown()"
        >
          <span><i class="bi bi-people-fill me-2"></i> Productos</span>
          <i
            class="bi"
            [ngClass]="{
              'bi-caret-down-fill': !isProductOpen,
              'bi-caret-up-fill': isProductOpen
            }"
          ></i>
        </a>

        <div class="collapse" [ngClass]="{ show: isProductOpen }">
          <ul class="nav flex-column ms-3 mt-1">
            <li>
              <a
                class="nav-link text-white sidebar-link"
                routerLink="products/view-products"
                routerLinkActive="active-link"
              >
                Ver Productos
              </a>
            </li>
            <li>
              <a
                class="nav-link text-white sidebar-link"
                routerLink="products/create-product"
                routerLinkActive="active-link"
              >
                Crear Productos
              </a>
            </li>
            <li>
              <a
                class="nav-link text-white sidebar-link"
                routerLink="products/edit-product"
                routerLinkActive="active-link"
              >
                Modificar Productos
              </a>
            </li>
          </ul>
        </div>
      </div>

      <!-- 🔴 Cerrar sesión -->
      <a
        class="nav-link text-white sidebar-link mt-4 text-danger fw-bold"
        style="cursor: pointer"
        (click)="logout()"
      >
        <i class="bi bi-box-arrow-right me-2"></i> Cerrar sesión
      </a>
    </nav>
  </aside>

  <!-- Content -->
  <main class="content flex-grow-1 p-4">
    <router-outlet></router-outlet>
  </main>
</div>
