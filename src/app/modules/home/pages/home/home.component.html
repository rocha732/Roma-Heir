<div class="d-flex">

  <!-- Sidebar -->
  <aside class="sidebar bg-dark text-white p-3">
    <div class="text-center mb-4">
      <img src="assets/ico-logo.svg" alt="Logo" class="img-fluid" style="max-width: 140px;">
    </div>

    <nav class="nav flex-column gap-2">
      <a class="nav-link text-white sidebar-link" 
         routerLink="dashboard" 
         routerLinkActive="active-link">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
      </a>

      <a class="nav-link text-white sidebar-link" 
         routerLink="profile" 
         routerLinkActive="active-link">
        <i class="bi bi-person-circle me-2"></i> Perfil
      </a>

      <a class="nav-link text-white sidebar-link" 
         routerLink="settings" 
         routerLinkActive="active-link">
        <i class="bi bi-gear-fill me-2"></i> Configuración
      </a>

      <!-- 🔴 Cerrar sesión -->
      <a class="nav-link text-white sidebar-link mt-4 text-danger fw-bold" 
         style="cursor: pointer;"
         (click)="logout()">
        <i class="bi bi-box-arrow-right me-2"></i> Cerrar sesión
      </a>
    </nav>
  </aside>

  <!-- Content -->
  <main class="content flex-grow-1 p-4">
    <router-outlet></router-outlet>
  </main>

</div>
