
<h2 class="page-title">Crear Usuario</h2>

<!-- Card de registro -->
<div
  class="card"
  style="max-width: 600px"
  [class.disabled-card]="submitted"
>
  <div class="card-body">

    <form [formGroup]="userForm" (ngSubmit)="submit()">
      <app-form-input
        label="Nombre"
        placeholder="Ingrese su nombre"
        [control]="firstName"
      ></app-form-input>
      <app-form-input
        label="Apellido"
        placeholder="Ingrese su apellido"
        [control]="lastName"
      ></app-form-input>
      <app-form-input
        label="Correo"
        type="email"
        placeholder="Ingrese su correo"
        [control]="email"
      ></app-form-input>
      <app-form-input
        label="Teléfono"
        placeholder="Ingrese su teléfono"
        [control]="phone"
      ></app-form-input>

      <div class="mb-3">
        <label class="form-label">País</label>
        <select class="form-select" formControlName="countryId">
          <option value="">Seleccione un país</option>
          <option *ngFor="let country of countries" [value]="country.id">
            {{ country.name }}
          </option>
        </select>
        <div
          *ngIf="countryId.touched && countryId.invalid"
          class="text-danger mt-1"
        >
          <small *ngIf="countryId.errors?.['required']"
            >El país es obligatorio</small
          >
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Rol</label>
        <select class="form-select" formControlName="roleId">
          <option value="">Seleccione un rol</option>
          <option *ngFor="let role of roles" [value]="role.id">
            {{ role.name }}
          </option>
        </select>
        <div
          *ngIf="roleId.touched && roleId.invalid"
          class="text-danger mt-1"
        >
          <small *ngIf="roleId.errors?.['required']"
            >El rol es obligatorio</small
          >
        </div>
      </div>

      <button
  type="submit"
  class="btn btn-primary w-100"
  [disabled]="userForm.invalid || submitted || isLoading"
>
  <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
  {{ isLoading ? 'Procesando...' : 'Crear Usuario' }}
</button>
    </form>
  </div>
</div>

<!-- Card de código de verificación -->
<div *ngIf="submitted" class="card shadow-sm mx-auto" style="max-width: 500px">
  <div class="card-body">
    <h5 class="card-title text-center mb-4">Código de Verificación</h5>

    <form [formGroup]="codeForm" (ngSubmit)="verifyCode()">
      <app-form-input
        label="Código"
        placeholder="Ingrese el código recibido"
        [control]="verificationCode"
      ></app-form-input>

      <div class="d-flex justify-content-between align-items-center mb-2">
        <small *ngIf="timerSeconds > 0"
          >Reintentar en {{ timerSeconds }}s</small
        >
        <button
          type="button"
          class="btn btn-link"
          (click)="resendCode()"
          [disabled]="timerSeconds > 0"
        >
          Reenviar código
        </button>
      </div>

      <button
  type="submit"
  class="btn btn-primary w-100"
  [disabled]="codeForm.invalid || isLoading"
>
  <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
  {{ isLoading ? 'Verificando...' : 'Verificar' }}
</button>
    </form>
  </div>
</div>
