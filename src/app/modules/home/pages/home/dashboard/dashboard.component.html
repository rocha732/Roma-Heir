<div class="row g-3">
  <!-- Completadas hoy -->
  <div class="col-md-3">
    <app-card-citas
      title="Citas completadas hoy"
      [value]="completadasHoy"
      type="hoy"
    ></app-card-citas>
  </div>

  <!-- Total de citas pendientes (Pendiente + Reprogramada) -->
  <div class="col-md-3">
    <app-card-citas
      title="Citas pendientes"
      [value]="pendientesTotal"
      type="pendientes"
    ></app-card-citas>
  </div>

  <!-- Citas canceladas -->
  <div class="col-md-3">
    <app-card-citas
      title="Citas canceladas"
      [value]="canceladas"
      type="canceladas"
    ></app-card-citas>
  </div>

  <!-- Citas confirmadas -->
  <div class="col-md-3">
    <app-card-citas
      title="Citas confirmadas"
      [value]="confirmadasHoy"
      type="confirmadas"
    ></app-card-citas>
  </div>
</div>

<!-- Segunda fila: Gráficos -->
<div class="row mt-4">
  <!-- Gráfico de barras (2/3) -->
  <div class="col-md-8">
    <div class="card chart-card p-3 h-100">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Citas por fecha y estado</h5>
        <div class="btn-group btn-group-sm" role="group">
          <button
            class="btn btn-outline-primary"
            [class.active]="selectedRange === 'week'"
            (click)="changeRange('week')"
          >
            Semana
          </button>
          <button
            class="btn btn-outline-primary"
            [class.active]="selectedRange === 'month'"
            (click)="changeRange('month')"
          >
            Mes
          </button>
          <button
            class="btn btn-outline-primary"
            [class.active]="selectedRange === 'all'"
            (click)="changeRange('all')"
          >
            Total
          </button>
        </div>
      </div>

      <div style="height: 380px;">
        <canvas
          baseChart
          [data]="chartData"
          [type]="'bar'"
          [options]="chartOptions"
        ></canvas>
      </div>
    </div>
  </div>

  <!-- Gráfico Pie (1/3) -->
  <div class="col-md-4">
    <div class="card chart-card p-3 h-100">
      <h5 class="mb-3">Reservaciones por especialista</h5>
     <div style="height: 380px; width: 100%">
  <canvas
    baseChart
    [data]="pieChartData"
    [type]="'pie'"
    [options]="pieChartOptions"
  ></canvas>
</div>
    </div>
  </div>
</div>
<div class="row g-3">
  <!-- Fila 3: Cards de órdenes -->
  <div class="col-md-3">
    <app-card-citas title="Órdenes totales" [value]="totalOrders" type="total"></app-card-citas>
  </div>
  <div class="col-md-3">
    <app-card-citas title="Órdenes pagadas" [value]="paidOrders" type="confirmadas"></app-card-citas>
  </div>
  <div class="col-md-3">
    <app-card-citas title="Órdenes no pagadas" [value]="unpaidOrders" type="pendientes"></app-card-citas>
  </div>
  <div class="col-md-3">
    <app-card-citas title="Ingresos totales" [value]="totalRevenue" type="hoy"></app-card-citas>
  </div>
</div>

<!-- Fila 4: Gráfico de órdenes -->
<div class="row mt-4">
  <div class="col-lg-8">
    <div class="card chart-card p-3">
      <h5>Órdenes por fecha y estado</h5>
      <div style="height: 380px;">
        <canvas baseChart [data]="ordersChartData" [type]="'bar'" [options]="chartOptions"></canvas>
      </div>
    </div>
  </div>
  <div class="col-lg-4">
    <div class="card chart-card p-3">
      <h5>Órdenes pagadas vs no pagadas</h5>
      <div style="height: 380px;">
        <canvas baseChart [data]="pieOrdersChartData" [type]="'pie'" [options]="pieChartOptions"></canvas>
      </div>
    </div>
  </div>
</div>
