<div class="row g-3">
  <!-- Completadas hoy -->
  <div class="col-md-3">
    <app-card-citas
      title="Citas completadas hoy"
      [value]="completadasHoy"
      type="hoy"
    ></app-card-citas>
  </div>

  <!-- Total de citas pendientes (Pendiente + Reprogramada) -->
  <div class="col-md-3">
    <app-card-citas
      title="Citas pendientes"
      [value]="pendientesTotal"
      type="pendientes"
    ></app-card-citas>
  </div>

  <!-- Citas canceladas -->
  <div class="col-md-3">
    <app-card-citas
      title="Citas canceladas"
      [value]="canceladas"
      type="canceladas"
    ></app-card-citas>
  </div>

  <!-- Citas confirmadas -->
  <div class="col-md-3">
    <app-card-citas
      title="Citas confirmadas"
      [value]="confirmadasHoy"
      type="confirmadas"
    ></app-card-citas>
  </div>
</div>

<!-- Gráfico de barras dentro de un card -->
<div class="row mt-4">
  <div class="col-12">
    <div class="card chart-card p-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Citas por fecha y estado</h5>
        <div class="btn-group btn-group-sm" role="group">
          <button
            class="btn btn-outline-primary"
            [class.active]="selectedRange === 'week'"
            (click)="changeRange('week')"
          >
            Semana
          </button>
          <button
            class="btn btn-outline-primary"
            [class.active]="selectedRange === 'month'"
            (click)="changeRange('month')"
          >
            Mes
          </button>
          <button
            class="btn btn-outline-primary"
            [class.active]="selectedRange === 'all'"
            (click)="changeRange('all')"
          >
            Total
          </button>
        </div>
      </div>

      <div style="height: 380px;">
        <canvas
          baseChart
          [data]="chartData"
          [type]="'bar'"
          [options]="chartOptions"
        ></canvas>
      </div>
    </div>
  </div>
</div>
