<h2 class="page-title">Crear nuevo producto</h2>

<!-- Shimmer Loading -->
<div *ngIf="loading" class="create-product-container">
  <div class="create-product-form">
    <div class="form-group">
      <div class="shimmer shimmer-label"></div>
      <div class="shimmer shimmer-input"></div>
    </div>
    <div class="form-group">
      <div class="shimmer shimmer-label"></div>
      <div class="shimmer shimmer-textarea"></div>
    </div>
    <div class="form-group">
      <div class="shimmer shimmer-label"></div>
      <div class="shimmer shimmer-input"></div>
    </div>
    <div class="form-group">
      <div class="shimmer shimmer-label"></div>
      <div class="shimmer shimmer-select"></div>
    </div>
    <div class="form-group">
      <div class="shimmer shimmer-label"></div>
      <div class="shimmer shimmer-image-area"></div>
    </div>
    <div class="form-group">
      <div class="shimmer shimmer-checkbox"></div>
    </div>
    <div class="shimmer shimmer-button"></div>
  </div>
</div>

<!-- Formulario -->
<div *ngIf="!loading" class="create-product-container">
  <div *ngIf="successMessage" class="alert alert-success" style="margin-bottom: 1rem;">
    {{ successMessage }}
  </div>
  <form (ngSubmit)="onSubmit()" #productForm="ngForm" class="create-product-form">
    <div class="form-group">
      <label class="form-group-label">Nombre</label>
      <input type="text" class="form-control" name="name" [(ngModel)]="product.name" required />
    </div>
    <div class="form-group">
      <label class="form-group-label">Descripción</label>
      <textarea class="form-control" name="description" [(ngModel)]="product.description" required></textarea>
    </div>
    <div class="form-group">
      <label class="form-group-label">Precio</label>
      <input type="number" class="form-control" name="price" [(ngModel)]="product.price" required min="1" />
    </div>
    <div class="form-group">
      <label class="form-group-label">Categoría</label>
      <select class="form-control" name="categoryId" [(ngModel)]="product.categoryId" required>
        <option [ngValue]="null">Selecciona una categoría</option>
        <option *ngFor="let cat of categoryList" [ngValue]="cat.id">{{ cat.name }}</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-group-label">Imagen</label>
      <div 
        class="image-drop-area"
        (dragover)="$event.preventDefault()"
        (drop)="onDrop($event)"
        (dragleave)="onDragLeave($event)"
        (dragenter)="onDragEnter($event)"
        [class.dragover]="isDragOver"
      >
        <input type="file" class="form-control" (change)="onFileChange($event)" style="display:none;" #fileInput />
        <div (click)="fileInput.click()" class="drop-text">
          <ng-container *ngIf="!imagePreview">Arrastra una imagen aquí o haz clic para seleccionar</ng-container>
          <img *ngIf="imagePreview" [src]="imagePreview" alt="Vista previa" class="image-preview" />
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-group-label">
        <input type="checkbox" name="available" [(ngModel)]="product.available" /> Disponible
      </label>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="!productForm.form.valid">Guardar producto</button>
  </form>
</div>
