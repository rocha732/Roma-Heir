<div class="products-title">Lista de productos</div>

<!-- Shimmer Loading -->
<div *ngIf="loading">
	<!-- Shimmer Stats -->
	<div class="products-stats">
		<div class="stat-card shimmer-stat">
			<div class="shimmer shimmer-icon"></div>
			<div class="shimmer-info">
				<div class="shimmer shimmer-stat-value"></div>
				<div class="shimmer shimmer-stat-label"></div>
			</div>
		</div>
		<div class="stat-card shimmer-stat">
			<div class="shimmer shimmer-icon"></div>
			<div class="shimmer-info">
				<div class="shimmer shimmer-stat-value"></div>
				<div class="shimmer shimmer-stat-label"></div>
			</div>
		</div>
		<div class="stat-card shimmer-stat">
			<div class="shimmer shimmer-icon"></div>
			<div class="shimmer-info">
				<div class="shimmer shimmer-stat-value"></div>
				<div class="shimmer shimmer-stat-label"></div>
			</div>
		</div>
		<div class="stat-card shimmer-stat">
			<div class="shimmer shimmer-icon"></div>
			<div class="shimmer-info">
				<div class="shimmer shimmer-stat-value"></div>
				<div class="shimmer shimmer-stat-label"></div>
			</div>
		</div>
	</div>

	<!-- Shimmer Actions -->
	<div class="products-actions">
		<div class="skeleton-input shimmer"></div>
		<div class="products-filters">
			<div class="skeleton-select shimmer"></div>
			<div class="skeleton-select shimmer"></div>
		</div>
	</div>
	
	<!-- Shimmer Cards -->
	<div class="products-list">
		<div *ngFor="let item of [1,2,3,4,5,6]" class="product-card-skeleton">
			<div class="skeleton-image shimmer"></div>
			<div class="skeleton-category shimmer"></div>
			<div class="skeleton-content">
				<div class="skeleton-title shimmer"></div>
				<div class="skeleton-description shimmer"></div>
				<div class="skeleton-footer">
					<div class="skeleton-price shimmer"></div>
					<div class="skeleton-badge shimmer"></div>
				</div>
			</div>
		</div>
	</div>
</div>

<!-- Content -->
<div *ngIf="!loading && products && products.length">
	<!-- Statistics Summary -->
	<div class="products-stats">
		<div class="stat-card stat-total">
			<div class="stat-icon">📦</div>
			<div class="stat-info">
				<div class="stat-value">{{ totalProducts }}</div>
				<div class="stat-label">Total Productos</div>
			</div>
		</div>
		<div class="stat-card stat-available">
			<div class="stat-icon">✅</div>
			<div class="stat-info">
				<div class="stat-value">{{ availableProducts }}</div>
				<div class="stat-label">Disponibles</div>
			</div>
		</div>
		<div class="stat-card stat-unavailable">
			<div class="stat-icon">⏸️</div>
			<div class="stat-info">
				<div class="stat-value">{{ unavailableProducts }}</div>
				<div class="stat-label">No Disponibles</div>
			</div>
		</div>
		<div class="stat-card stat-price">
			<div class="stat-icon">💰</div>
			<div class="stat-info">
				<div class="stat-value">S/. {{ averagePrice | number:'1.2-2' }}</div>
				<div class="stat-label">Precio Promedio</div>
			</div>
		</div>
	</div>

	<div class="products-actions">
		<input 
			#searchBox 
			type="text" 
			class="products-search" 
			placeholder="Buscar producto" 
			(input)="onSearch(searchBox.value)" />

		<div class="products-filters">
			<select class="products-search" [(ngModel)]="selectedCategory" (change)="onFilterChange()">
				<option [ngValue]="null">Todas las categorías</option>
				<option *ngFor="let cat of categoryList" [ngValue]="cat.name">{{ cat.name }}</option>
			</select>
		</div>
	</div>

	<div class="products-list">
		<app-product-card
			*ngFor="let product of filteredProducts"
			[profileImageUrl]="product.profileImageUrl || 'https://placehold.co/320x160'"
			[categoryName]="product.categoryName || 'Sin categoría'"
			[name]="product.name"
			[description]="product.description"
			[price]="product.price"
			[available]="product.available"
			[productTypeName]="product.productType?.name || 'Tipo desconocido'"
			[onEditCallback]="onEditProduct"
			[id]="product.id"
		></app-product-card>
	</div>
</div>

<!-- Empty State -->
<div *ngIf="!loading && (!products || !products.length)" class="products-empty">
	<span class="icon-empty">📦</span>
	<p>No hay productos para mostrar.</p>
</div>
