<!-- Loading Overlay -->
<div class="loading-overlay" *ngIf="loading">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <p class="loading-text">Cargando...</p>
  </div>
</div>

<!-- Login Container -->
<div class="login-container">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <img src="assets/ico-logo.svg" alt="Roma Hair" />
    </div>

    <!-- Title -->
    <h1 class="login-title">Bienvenido</h1>
    <p class="login-subtitle">Ingresa a tu cuenta</p>

    <!-- Form -->
    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="email" class="form-label">Correo electrónico</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          class="form-input"
          placeholder="ejemplo@correo.com"
          required
        />
      </div>

      <button type="submit" class="btn-login">
        Ingresar
      </button>
    </form>

    <!-- Footer -->
    <p class="login-footer">
      Productos de belleza y cuidado personal
    </p>
  </div>
</div>

<!-- Verification Modal -->
<div class="modal-overlay" *ngIf="showModal">
  <div class="modal-card">
    <div class="modal-header">
      <h2 class="modal-title">Verificación</h2>
      <button class="modal-close" (click)="closeModal()">✕</button>
    </div>
    
    <div class="modal-body">
      <p class="modal-message">Se envió un código a tu correo:</p>
      <p class="modal-email">{{ email }}</p>
      
      <div class="form-group">
        <label for="code" class="form-label">Código de verificación</label>
        <input
          type="text"
          id="code"
          [(ngModel)]="code"
          name="code"
          class="form-input code-input"
          placeholder="Ingresa tu código"
          maxlength="6"
        />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-verify" (click)="verifyCode()">
        Verificar
      </button>
    </div>
  </div>
</div>
